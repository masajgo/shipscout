services:
  - type: worker
    name: shipscout-ais-worker
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AISSTREAM_API_KEY
        sync: false
      - key: DATALASTIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
    autoDeploy: true
